# Reproducible local Postgres for Trending Table.
# Local dev on this machine uses the existing Postgres on :5432 (see backend/.env);
# use this when you want an isolated container instead. Then point backend/.env at:
#   CONTROL_DATABASE_URL=postgresql://tt:tt@localhost:5544/tt_control
#   APP_DATABASE_URL=postgresql://tt:tt@localhost:5544/tt_app
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tt
      POSTGRES_PASSWORD: tt
      POSTGRES_DB: tt_control
    ports:
      - "5544:5432"
    volumes:
      - tt_pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
volumes:
  tt_pgdata:
